name: deployement test

run-name: ${{github.actor}} is testing out github actions

#declencheur

on: 
    issues:
      types: [opened, edited]

on:
    push:
        branches:
            - main
            - master
    pull_request:
        branches:
            - main
            - master
    tags:
        - 'v2'
        - 'v2.*.*'

on:
  schedule:
     - cron: '0 0 * * *'


permissions:
    group: ${{ github.workflow }} - ${{ github.ref }}  
  

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - users: action/checkout@v3
            - name: build the docker image
              run: echo
    
    test:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - users: actions/checkout@v3
            - name: build the docker image
            - run: echo

    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - users: ././github/actions/hello
            - name: build the docker image
            - run: echo


